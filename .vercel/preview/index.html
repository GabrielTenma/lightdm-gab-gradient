<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="login-background"></div>
    <div id="wrapper">
        <div id="login-box">
            <img id="login-picture" alt="User avatar" />
            <div id="login-response" role="alert" aria-live="polite"></div>
            <br />
            <form id="login-form">
                <button type="button" id="last" aria-label="Previous user">&nbsp;</button>
                <div id="container">
                    <div id="name" aria-live="polite"></div>
                </div>
                <button type="button" id="next" aria-label="Next user">&nbsp;</button>
                <input
                    placeholder="Enter Password"
                    type="password"
                    id="login-password"
                    aria-label="Password"
                    autocomplete="current-password"
                    tabindex="2"
                />
                <button id="login-button" type="submit" tabindex="3">
                    Log in
                </button>
            </form>
        </div>
    </div>

    <script src="jquery-2.1.0.min.js"></script>
    <script src="detect.js"></script>
    <script src="main.js"></script>
    <script src="mock.vercel.js"></script>
</body>
</html>
